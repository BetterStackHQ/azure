name: Build function

on:
  push:
    branches: [main]
    paths:
      - "function/**"
      - ".github/workflows/build-function.yml"
  pull_request:
    paths:
      - "function/**"
      - ".github/workflows/build-function.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: function
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: function/package-lock.json

      - run: npm ci
      - run: npm test
      - run: npm run build

      - name: Install production deps for packaging
        run: |
          rm -rf node_modules
          npm ci --omit=dev

      - name: Create zip
        run: |
          zip -r function.zip host.json package.json dist node_modules \
            -x 'node_modules/.cache/*' -x 'node_modules/.bin/*'

      - uses: actions/upload-artifact@v4
        with:
          name: function-zip
          path: function/function.zip
          retention-days: 7
